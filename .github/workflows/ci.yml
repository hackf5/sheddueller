name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Build and test (${{ matrix.postgres-image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres-image:
          - postgres:14
          - postgres:16
          - postgres:18
    env:
      SHEDDUELLER_POSTGRES_IMAGE: ${{ matrix.postgres-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Sheddueller.slnx

      - name: Verify format
        run: dotnet format Sheddueller.slnx --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build Sheddueller.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution Sheddueller.slnx --configuration Release --no-build
